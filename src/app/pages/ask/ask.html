<div class="page">
  <h1 class="question">Will you be my girlfriend / partner? 💕</h1>

  <div class="gif-container">
    <img src="assets/ask.gif" alt="cute gif" class="gif" onerror="this.style.display='none'" />
  </div>

  <div class="buttons">
    <button class="btn yes-btn" (click)="onYes()">Yes 💖</button>
    <button class="btn no-btn" (click)="onNo()">No</button>
  </div>
</div>
